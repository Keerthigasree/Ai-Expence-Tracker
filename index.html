<!DOCTYPE html>
<html>
<head>
<title>AI Expense Tracker Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1fae8b,#4ec5a5);
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logout{
background:red;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
}

.card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

.card h2{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

button{
background:#00e676;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:8px;
border:1px solid #ccc;
}

.chatbox{
background:white;
color:black;
height:150px;
overflow:auto;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
}

</style>

</head>

<body>

<div class="header">

<h1>💰 AI Expense Tracker Dashboard</h1>

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="dashboard">

<!-- Add Expense -->

<div class="card">

<h2>Add Expense</h2>

<input id="amount" placeholder="Amount">

<input id="category" placeholder="Category">

<input id="description" placeholder="Description">

<input type="date" id="date">

<button onclick="addExpense()">Add Expense</button>

</div>

<!-- Expense Table -->

<div class="card">

<h2>All Expenses</h2>

<table>

<thead>

<tr>

<th>Amount</th>

<th>Category</th>

<th>Description</th>

<th>Date</th>

</tr>

</thead>

<tbody id="expenseTable"></tbody>

</table>

</div>

<!-- AI Chatbot -->

<div class="card">

<h2>AI Chatbot</h2>

<div class="chatbox" id="chatbox"></div>

<input id="chatInput" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>

</div>

<!-- Analytics -->

<div class="card">

<h2>Expense Analytics</h2>

<canvas id="pieChart"></canvas>

<br>

<h3>Monthly Spending</h3>

<canvas id="barChart"></canvas>

</div>

</div>

<script>

let expenses=[]

function addExpense(){

let amount=document.getElementById("amount").value
let category=document.getElementById("category").value
let description=document.getElementById("description").value
let date=document.getElementById("date").value

let table=document.getElementById("expenseTable")

let row=table.insertRow()

row.insertCell(0).innerHTML="₹"+amount
row.insertCell(1).innerHTML=category
row.insertCell(2).innerHTML=description
row.insertCell(3).innerHTML=date

expenses.push({amount,category})

updateChart()

}

function sendMessage(){

let msg=document.getElementById("chatInput").value
let chat=document.getElementById("chatbox")

chat.innerHTML += "<p><b>You:</b> "+msg+"</p>"

if(msg=="total"){

let total=0
expenses.forEach(e=>total+=Number(e.amount))

chat.innerHTML += "<p><b>Bot:</b> Your total spending is ₹"+total+"</p>"

}else{

chat.innerHTML += "<p><b>Bot:</b> Try typing 'total'</p>"

}

}

function logout(){

window.location.href="login.html"

}

let pieChart=new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{

labels:[],

datasets:[{

data:[],

backgroundColor:["#ff6384","#36a2eb","#ffce56","#4bc0c0"]

}]

}

})

function updateChart(){

let categoryTotals={}

expenses.forEach(e=>{

categoryTotals[e.category]=(categoryTotals[e.category]||0)+Number(e.amount)

})

pieChart.data.labels=Object.keys(categoryTotals)

pieChart.data.datasets[0].data=Object.values(categoryTotals)

pieChart.update()

}

let barChart=new Chart(document.getElementById("barChart"),{

type:"bar",

data:{

labels:["Feb","Mar"],

datasets:[{

label:"Monthly Spending",

data:[300,800],

backgroundColor:"#36a2eb"

}]

}

})

</script>

</body>

</html>
