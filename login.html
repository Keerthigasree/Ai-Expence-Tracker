<!DOCTYPE html>
<html>
<head>
<title>Login - AI Expense Tracker</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1fae8b,#4ec5a5);
}

.container{
display:flex;
width:850px;
height:450px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.left{
flex:1;
background:linear-gradient(135deg,#1fae8b,#4ec5a5);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.left h1{
font-size:32px;
margin-bottom:10px;
}

.left p{
opacity:0.9;
}

.right{
flex:1;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.right h2{
margin-bottom:20px;
}

input{
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
padding:12px;
margin-top:15px;
background:#1fae8b;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#179f7f;
}

.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="left">
<h1>💰 ExpenseAI</h1>
<p>Smart AI Powered Expense Tracking</p>
</div>

<div class="right">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

</div>

</div>

<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==="admin" && pass==="1234"){

window.location.href="index.html"

}else{

document.getElementById("error").innerText="Invalid username or password"

}

}

</script>

</body>
</html>
